		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;

			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

# Problema #5

## Fechas y zonas horarias
</div>

<aside class="notes"><p>El enemigo silencioso.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

```java
// "Funciona en mi máquina"
LocalDateTime vencimiento = LocalDateTime.now().plusDays(1);
if (LocalDateTime.now().isAfter(vencimiento)) {
    marcarComoCaducado(prestamo);
}
```

```text
Tu portátil:    Europa/Madrid (UTC+1)
Servidor prod:  UTC

Un préstamo "vence a las 00:00 del día 15"...
  → para ti son las 01:00 (15) en local
  → para el servidor son las 23:00 (14) en UTC

Resultado: el préstamo se marca caducado UNA HORA ANTES de lo previsto.
Y nadie lo nota... hasta que alguien reclama.
```
</div>

<aside class="notes"><p>¿Hora local? ¿UTC? ¿Servidor? ¿Cliente?</p>
<p>El bug no está en la lógica — <code>isAfter</code> es correcto. Está en que <code>LocalDateTime.now()</code> no lleva zona horaria pegada: cada máquina la interpreta con la suya. En tu portátil y en el servidor, &quot;ahora&quot; significa cosas distintas.</p>
<p>La solución casi siempre es la misma: trabajar internamente en <code>Instant</code> / <code>ZonedDateTime</code> con UTC explícito, y convertir a hora local solo en la capa de presentación — nunca al revés.</p>

<p>Muy típico en administración (cierres de mes, procesos batch a medianoche, informes &quot;del día anterior&quot;).</p>

# Problema #9

## Configuración distinta

Local (`application-dev.properties`):

```properties
debug=true
spring.profiles.active=dev
spring.jpa.show-sql=true
logging.level.com.miempresa=DEBUG
```

Producción (alguien copia el de dev "para no perder tiempo"):

```properties
debug=true
spring.profiles.active=dev
spring.jpa.show-sql=true
logging.level.com.miempresa=DEBUG
```

```text
Resultado, una semana después:
  · El log de producción pesa 40 GB y tira el disco del servidor
  · Cada SQL se imprime entero, con datos de clientes incluidos
  · Las páginas de error muestran trazas completas (stacktrace) a cualquier usuario
  · El equipo de seguridad pregunta, muy serio, "¿quién ha activado debug en prod?"
```
</div>

<aside class="notes"><p>Cambian: perfiles, properties, conexiones (BD, URLs externas), CORS, puertos...</p>
<p>Pero el ejemplo real es más sutil que &quot;cambiar dos líneas&quot;: es lo que pasa cuando <strong>no</strong> las cambias. <code>debug=true</code> en local es comodísimo — ves cada SQL, cada traza, cada detalle. Ese mismo <code>debug=true</code> en producción es una fuga de información (datos de clientes en los logs) y un problema de rendimiento (el disco se llena en días).</p>
<p>Otra vez la sesión de <strong>Properties</strong>: <code>application-dev.properties</code> vs <code>application-prod.properties</code>, y <code>spring.profiles.active</code>. Si esa separación está bien hecha desde el principio, cambiar de entorno es solo cambiar una variable — no copiar y &quot;ajustar a mano&quot; un archivo entero el día del despliegue, que es exactamente cuando se cometen estos errores.</p>

# Hay algo que nos dijo Rob Pike

## Las 5 reglas de la programación

> Escritas hace décadas. Siguen siendo ignoradas cada día.
</div>

<aside class="notes"><p>Transición natural: hemos visto los problemas del día a día. Ahora vamos a ver sabiduría destilada de décadas de ingeniería real. Rob Pike: creador de Go, ex-Bell Labs, trabajó con Ken Thompson. No son reglas académicas. Las escribió gente que había sufrido lo contrario.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

# Regla #1

## No sabes dónde va a estar el cuello de botella

```text
❌ "Seguro que el problema está en la consulta SQL"
❌ "Esto va lento, voy a optimizar el bucle"
❌ "Mejor uso un algoritmo más sofisticado aquí"

✅ Primero: medir. Luego: actuar.
```

> Los cuellos de botella aparecen donde menos te lo esperas.
</div>

<aside class="notes"><p>Cuántas horas perdidas optimizando lo que no era el problema. El instinto engaña. Los datos no. No toques nada hasta saber dónde está realmente el problema.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

# Regla #2

## Mide. Luego optimiza. En ese orden.

```java
// ❌ Optimización prematura
private final Map<String, Result> cache = new HashMap<>(); // "por si acaso va lento"

// ✅ Primero funcionando, luego con datos reales
Result calculate(String input) {
    return heavyOperation(input); // ← mide esto primero
}
```

> "Premature optimization is the root of all evil." — Tony Hoare
</div>

<aside class="notes"><p>Pike y Hoare se alinean aquí perfectamente. Optimizar sin medir es adivinar. Y adivinar en producción es arriesgado. Herramientas: profilers, APM, logs de tiempo, métricas de base de datos. El código claro que va &quot;un poco lento&quot; casi siempre es suficiente.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

# Regla #3

## Los algoritmos fancy son lentos cuando n es pequeño

```text
Tu dataset: 200 registros
Tu solución: árbol B+ autobalanceado con índice invertido

Resultado real:
  → 3ms con ArrayList y un for
  → 3ms con tu obra maestra de ingeniería
  → pero 3 semanas de desarrollo extra
```

> Y n... casi siempre es pequeño.
</div>

<aside class="notes"><p>Ken Thompson lo resumió: &quot;When in doubt, use brute force.&quot; El 90% de los sistemas empresariales manejan volúmenes modestos. El algoritmo O(n²) sobre 500 registros va perfectamente. Guarda la complejidad para cuando los datos la justifiquen, con métricas.</p>

# Regla #4

## Los algoritmos fancy también tienen más bugs

```java
// ❌ "Optimizado"
int partition(int[] arr, int low, int high) {
    int pivot = arr[high]; int i = low - 1;
    for (int j = low; j < high; j++) {
        if (arr[j] <= pivot) { i++; int t = arr[i];
            arr[i] = arr[j]; arr[j] = t; } }
    int t = arr[i+1]; arr[i+1] = arr[high]; arr[high] = t;
    return i + 1; // ← ¿seguro?
}

// ✅ Simple, legible, correcto
Collections.sort(list);
```
</div>

<aside class="notes"><p>KISS: Keep It Simple, Stupid. Cuanto más complejo el algoritmo, más superficie de error. Y más difícil de mantener para quien venga después (o para ti en 6 meses). La elegancia real es el código que no necesita explicación.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

# Regla #5

## Los datos mandan

```text
❌ Diseño habitual:
   "¿Qué métodos necesito?" → luego adapto los datos

✅ Diseño correcto:
   "¿Cuáles son mis datos y cómo se relacionan?" → los algoritmos aparecen solos
```

```java
// Si tu estructura de datos es correcta...
List<Loan> activeLoans = user.getActiveLoans(); // ...esto es trivial
```

> "Write stupid code that uses smart objects."
</div>

<aside class="notes"><p>Fred Brooks ya lo dijo en The Mythical Man-Month. Si el modelo de datos es bueno, la lógica de negocio se escribe sola. Si estás peleando con la lógica, probablemente el problema está en el modelo. Invertir tiempo en diseñar bien las entidades ahorra semanas de algoritmos complicados.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

# Las 5 reglas, en resumen

|Regla|Idea central|
|---|---|
|#1 No adivines|Los cuellos de botella sorprenden|
|#2 Mide primero|Sin datos, no hay decisión|
|#3 n es pequeño|La simplicidad suele ganar|
|#4 Simple = menos bugs|Fancy es caro de mantener|
|#5 Los datos mandan|Buen modelo → algoritmos obvios|
</div>

<aside class="notes"><p>Estas reglas no son para memorizar. Son para tener presentes cuando la presión aprieta. Cuando alguien proponga una solución compleja, pregunta: ¿hemos medido? ¿cuánto es n? La mayoría de los problemas de producción que hemos visto antes se evitan aplicando estas reglas.</p>
<!-- .slide: data-background-image="Adjuntos/slides.eap.png" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

# La conexión con producción

```text
Regla #1 + #2  →  No optimices logs, mide primero dónde falla
Regla #3 + #4  →  No sobreingenieres: el hotfix simple es mejor que el fancy con bugs
Regla #5       →  Un buen modelo de datos evita el 80% de los problemas de concurrencia
```
</div>

<aside class="notes"><p>Cerrar el círculo: las reglas de Pike no son teoría abstracta. Son exactamente la respuesta a los 10 problemas que hemos visto. El código más mantenible en producción casi siempre es el más simple.</p>
